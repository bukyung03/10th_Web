<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 실습</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar__container">
            
            <div class="navbar__logo">
                <div class="navbar__logo-icon"></div>
                <span class="navbar__brand-name">Aido</span>
            </div>

            <div class="navbar__menu">
                <span class="navbar__menu-item lang-target"
                    data-ko="고양이 친구들"
                    data-en="Cat Friends">고양이 친구들</span>
                <a href="#" class="navbar__btn-notify lang-target"
                    data-ko = "패치 노트"
                    data-en = "Patch Notes">패치 노트</a>
                
                <div class="lang-toggle">
                    <button id="btn-ko" class="lang-toggle__btn">KO</button>
                    <button id="btn-en" class="lang-toggle__btn">EN</button>
                </div>
            </div>

        </div>
    </nav>

    <script>
        const btnKo = document.getElementById('btn-ko');
        const btnEn = document.getElementById('btn-en');
        // lang-target 클래스를 가진 모든 요소를 가져옴
        const langTargets = document.querySelectorAll('.lang-target');

        function changeLanguage(lang){
            // 버튼 스타일
            if (lang ==='ko'){
                btnKo.classList.add('lang-toggle__btn--active');
                btnEn.classList.remove('lang-toggle__btn--active');
            } else {
                btnEn.classList.add('lang-toggle__btn--active');
                btnKo.classList.remove('lang-toggle__btn--active');
            }

            langTargets.forEach(target => {
                target.textContent = target.getAttribute(`data-${lang}`);
            });
        }

        // 한국어 버튼
        btnKo.addEventListener('click',()=>changeLanguage('ko'));
        // 영어 버튼
        btnEn.addEventListener('click',()=>changeLanguage('en'));

        // 첫 시작 화면 기본값을 한국어로 설정
        changeLanguage('ko');
    </script>
</body>
</html>
